# Apache configuration for Telegram Bot on Render.com

# Security settings
ServerTokens Prod
ServerSignature Off
TraceEnable Off

# AllowOverride all para permitir .htaccess
<Directory /var/www/html>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

# Enable mod_rewrite
RewriteEngine On

# PHP settings
php_value upload_max_filesize 128M
php_value post_max_size 128M
php_value max_execution_time 30
php_value memory_limit 256M
