# Apache configuration for Telegram Bot on Render.com
# Custom DocumentRoot to serve from public directory

# Set DocumentRoot to public directory
DocumentRoot /var/www/html/public

<Directory /var/www/html/public>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

# Also allow the root directory
<Directory /var/www/html>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

# Apache settings
ServerName localhost
ServerTokens Prod
ServerSignature Off
TraceEnable Off
