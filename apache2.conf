# Apache configuration for Telegram Bot on Render.com
# This file is optional - the default php:apache image works fine
# Only copy if you need custom settings

# Enable mod_rewrite (already enabled in php:apache)
# RewriteEngine On

# PHP settings (can also be set via php.ini)
# php_value upload_max_filesize 128M
# php_value post_max_size 128M
# php_value max_execution_time 30
# php_value memory_limit 256M
